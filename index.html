<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyInvoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      <div class="logo-mark">M</div>
      <h1>MyInvoice <span class="header-sub">— Invoice Builder</span></h1>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" id="sampleBtn"><span>📋</span> <span>Sample</span></button>
      <button class="btn btn-ghost btn-sm" id="clearBtn"><span>🗑</span> <span>Clear</span></button>
    </div>
  </header>

  <div class="app-container">

    <!-- FORM -->
    <div class="form-side">

      <div class="form-section">
        <div class="form-section-header">
          <div class="section-icon purple">🏢</div>
          <h2>From <span class="badge">Your Company</span></h2>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Company Name</label>
            <input type="text" id="companyName" placeholder="Excel Corp">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="companyEmail" placeholder="hello@excelcorp.com">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone</label>
            <input type="text" id="companyPhone" placeholder="+1 (555) 123-4567">
          </div>
          <div class="form-group">
            <label>Address</label>
            <textarea id="companyAddress" placeholder="123 Business Ave, City, State"></textarea>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-header">
          <div class="section-icon green">👤</div>
          <h2>Bill To <span class="badge">Client</span></h2>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Client Name</label>
            <input type="text" id="clientName" placeholder="TechStart Inc.">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="clientEmail" placeholder="billing@techstart.io">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone</label>
            <input type="text" id="clientPhone" placeholder="+1 (555) 987-6543">
          </div>
          <div class="form-group">
            <label>Address</label>
            <textarea id="clientAddress" placeholder="456 Innovation Drive, City, State"></textarea>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-header">
          <div class="section-icon blue">📋</div>
          <h2>Invoice Details</h2>
        </div>
        <div class="form-row three-col">
          <div class="form-group">
            <label>Invoice Number</label>
            <input type="text" id="invoiceNumber" placeholder="INV-001">
          </div>
          <div class="form-group">
            <label>Issue Date</label>
            <input type="date" id="issueDate">
          </div>
          <div class="form-group">
            <label>Due Date</label>
            <input type="date" id="dueDate">
          </div>
        </div>
      </div>

      <div class="form-section items-section">
        <div class="form-section-header">
          <div class="section-icon amber">📦</div>
          <h2>Items <span class="badge">Line Items</span></h2>
        </div>
        <div class="items-table-wrapper">
          <table class="items-table">
            <thead>
              <tr>
                <th style="width:44%">Description</th>
                <th style="width:13%">Qty</th>
                <th style="width:16%">Rate</th>
                <th style="width:16%">Amount</th>
                <th style="width:30px"></th>
              </tr>
            </thead>
            <tbody id="itemsBody"></tbody>
          </table>
        </div>
        <div class="add-item-row">
          <button class="btn btn-secondary btn-sm" id="addItemBtn">+ Add Item</button>
        </div>

        <div class="totals-section">
          <div class="total-row">
            <label>Subtotal</label>
            <span class="value" id="subtotal">$0.00</span>
          </div>
          <div class="total-row tax-row">
            <label>Tax Rate (%)</label>
            <input type="number" id="taxRate" value="" min="0" step="0.1" placeholder="0">
            <span class="value" id="taxAmount">$0.00</span>
          </div>
          <div class="total-row discount-row">
            <label>Discount ($)</label>
            <input type="number" id="discount" value="" min="0" step="1" placeholder="0">
            <span class="value" id="discountAmount">$0.00</span>
          </div>
          <div class="total-row grand-total">
            <label>Total</label>
            <span class="value" id="totalAmount">$0.00</span>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-header">
          <div class="section-icon purple">📝</div>
          <h2>Additional Info</h2>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="notes" placeholder="Payment instructions, thank you notes, etc."></textarea>
        </div>
        <div class="form-group" style="margin-top:12px">
          <label>Terms & Conditions</label>
          <textarea id="terms" placeholder="Payment terms, refund policy, etc."></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" id="exportPdfBtn">↓ Export PDF</button>
      </div>
    </div>

    <!-- PREVIEW -->
    <div class="preview-section">
      <div class="preview-card">
        <div class="preview-card-header">
          <h3>Invoice Preview</h3>
          <span class="preview-zoom-badge">Live</span>
        </div>
        <div id="invoicePreview">
          <div class="preview-empty">
            <div class="icon">📄</div>
            <h3>No items yet</h3>
            <p>Add line items to your invoice to see a live preview here.</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="js/script.js"></script>
</body>
</html>
